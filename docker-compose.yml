services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vitalissy}
      POSTGRES_USER: ${POSTGRES_USER:-vitalissy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vitalissy} -d ${POSTGRES_DB:-vitalissy}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-vitalissy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vitalissy}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOAD_DIR: /app/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-${APP_URL:?Defina APP_URL}}
      APP_URL: ${APP_URL:?Defina APP_URL}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-manual}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-}
      PAYMENT_SUCCESS_PATH: ${PAYMENT_SUCCESS_PATH:-/premium?payment=success}
      PAYMENT_CANCEL_PATH: ${PAYMENT_CANCEL_PATH:-/premium?payment=cancelled}
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  postgres_data:
  backend_uploads:
