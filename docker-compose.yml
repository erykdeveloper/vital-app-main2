version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vitalissy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vitalissy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: node:20-alpine
    container_name: vitalissy-backend
    restart: unless-stopped
    working_dir: /app/backend
    depends_on:
      - postgres
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vitalissy
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      UPLOAD_DIR: ./uploads
      CORS_ORIGIN: http://localhost
    command: sh -c "npm install && npm run prisma:generate && npm run prisma:deploy && npm run prisma:seed && npm run build && npm run start"
    ports:
      - "3001:3001"
    volumes:
      - .:/app

volumes:
  postgres_data:
